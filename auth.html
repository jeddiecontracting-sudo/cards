<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if mode == 'login' %}Log In{% else %}Sign Up{% endif %} — Card Radar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--surface:#10101c;--surface2:#18182a;--border:#24243a;--accent:#7fff00;--text:#f0f0f8;--muted:#606070;--error:#ff4757;--success:#47ffb2;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 20%,rgba(127,255,0,0.07) 0%,transparent 65%);pointer-events:none;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:440px;position:relative;box-shadow:0 32px 80px rgba(0,0,0,0.5);}

.back{position:absolute;top:20px;left:20px;color:var(--muted);text-decoration:none;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.2s;display:flex;align-items:center;gap:6px;}
.back:hover{color:var(--text);}
.back svg{width:14px;height:14px;}

.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.5px;text-align:center;margin-bottom:28px;display:block;text-decoration:none;color:var(--text);}
.logo span{color:var(--accent);}

.tabs{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px;}
.tab{flex:1;padding:10px;border-radius:9px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--muted);}
.tab.active{background:var(--accent);color:#080810;}

.google-btn{width:100%;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;transition:all 0.2s;text-decoration:none;}
.google-btn:hover{border-color:rgba(127,255,0,0.4);background:#1a1a2e;transform:translateY(-1px);}
.google-btn svg{flex-shrink:0;}

.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;}

.field{margin-bottom:14px;}
label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
input{width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--accent);}
input::placeholder{color:#303040;}

.submit-btn{width:100%;padding:15px;background:var(--accent);color:#080810;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:all 0.2s;}
.submit-btn:hover{background:#a0ff40;transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.terms{text-align:center;margin-top:18px;font-size:11px;color:var(--muted);line-height:1.6;}
.terms a{color:rgba(127,255,0,0.7);text-decoration:none;}

.msg-box{border-radius:10px;padding:12px 16px;font-size:12px;margin-bottom:16px;display:none;}
.msg-box.show{display:block;}
.msg-box.error{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);color:var(--error);}
.msg-box.success{background:rgba(71,255,178,0.1);border:1px solid rgba(71,255,178,0.3);color:var(--success);}

.name-field{display:none;}
.name-field.show{display:block;}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="back">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 1L3 7l6 6"/></svg>
    Home
  </a>

  <a href="/" class="logo">Card <span>Radar</span></a>

  <div class="tabs">
    <button class="tab {% if mode == 'login' %}active{% endif %}" onclick="switchTab('login')" id="tab-login">Log In</button>
    <button class="tab {% if mode == 'signup' %}active{% endif %}" onclick="switchTab('signup')" id="tab-signup">Sign Up</button>
  </div>

  <a href="/auth/google" class="google-btn">
    <svg width="18" height="18" viewBox="0 0 18 18">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Continue with Google
  </a>

  <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>

  <div class="msg-box" id="msg-box"></div>

  <div class="name-field {% if mode == 'signup' %}show{% endif %}" id="name-field">
    <div class="field">
      <label>Name</label>
      <input type="text" id="name" placeholder="Your name" autocomplete="name">
    </div>
  </div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="submit-btn" onclick="handleSubmit()" id="submit-btn">
    {% if mode == 'login' %}LOG IN{% else %}CREATE ACCOUNT{% endif %}
  </button>

  <p class="terms" id="terms-text">
    {% if mode == 'signup' %}
    By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
    {% else %}
    Don't have an account? <a href="#" onclick="switchTab('signup');return false;">Sign up free</a>
    {% endif %}
  </p>
</div>

<script>
let currentMode = '{{ mode }}';

function switchTab(mode) {
  currentMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('name-field').classList.toggle('show', mode === 'signup');
  document.getElementById('submit-btn').textContent = mode === 'login' ? 'LOG IN' : 'CREATE ACCOUNT';
  document.getElementById('terms-text').innerHTML = mode === 'signup'
    ? 'By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.'
    : 'Don\'t have an account? <a href="#" onclick="switchTab(\'signup\');return false;">Sign up free</a>';
  hideMsg();
}

function showMsg(msg, type='error') {
  const el = document.getElementById('msg-box');
  el.textContent = msg;
  el.className = `msg-box ${type} show`;
}
function hideMsg() { document.getElementById('msg-box').classList.remove('show'); }

async function handleSubmit() {
  hideMsg();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) { showMsg('Please fill in your email and password.'); return; }

  btn.disabled = true;
  btn.textContent = currentMode === 'login' ? 'LOGGING IN...' : 'CREATING ACCOUNT...';

  try {
    if (currentMode === 'login') {
      const res = await fetch('/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password})});
      const data = await res.json();
      if (data.success) window.location = data.redirect;
      else { showMsg(data.error || 'Invalid email or password.'); btn.disabled=false; btn.textContent='LOG IN'; }
    } else {
      const name = document.getElementById('name')?.value || '';
      if (password.length < 6) { showMsg('Password must be at least 6 characters.'); btn.disabled=false; btn.textContent='CREATE ACCOUNT'; return; }
      const res = await fetch('/auth/signup', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, email, password})});
      const data = await res.json();
      if (data.success) window.location = data.redirect;
      else { showMsg(data.error || 'Could not create account.'); btn.disabled=false; btn.textContent='CREATE ACCOUNT'; }
    }
  } catch(e) { showMsg('Network error, please try again.'); btn.disabled=false; btn.textContent=currentMode==='login'?'LOG IN':'CREATE ACCOUNT'; }
}

const params = new URLSearchParams(window.location.search);
if (params.get('error') === 'google_no_email') showMsg('Google sign-in did not return an email address. Please try again.');
if (params.get('error') === 'google_failed') showMsg('Google sign-in failed. Please try again or use email.');

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
</script>
</body>
</html>
